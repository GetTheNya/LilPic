name: LilPic Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore LilPic.sln

    - name: Build
      run: dotnet build --no-restore -c Release LilPic.sln

    - name: Set Version
      id: version
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}"
        $numericVer = ($ver -replace '^v', '')
        if ("${{ github.ref_type }}" -ne "tag") { $numericVer = "0.0.0"; $ver = "0.0.0-dev" }
        echo "VAL=$ver" >> $env:GITHUB_OUTPUT
        echo "NUM=$numericVer" >> $env:GITHUB_OUTPUT

    # 1. Framework Dependent Build (Smaller, needs .NET 8)
    - name: Publish Framework Dependent
      run: dotnet publish LilPic.csproj -c Release -p:Version=${{ steps.version.outputs.NUM }} -p:InformationalVersion=${{ steps.version.outputs.VAL }} -o ./publish/framework-dependent

    # 2. Self-Contained Build (Larger, win-x64)
    - name: Publish Self-Contained
      run: dotnet publish LilPic.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=${{ steps.version.outputs.NUM }} -p:InformationalVersion=${{ steps.version.outputs.VAL }} -o ./publish/self-contained-win-x64

    - name: Zip Artifacts
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath LilPic-FrameworkDependent.zip
        Compress-Archive -Path ./publish/self-contained-win-x64/* -DestinationPath LilPic-SelfContained-win-x64.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          LilPic-FrameworkDependent.zip
          LilPic-SelfContained-win-x64.zip
        body: "LilPic Release - Automated Build"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
